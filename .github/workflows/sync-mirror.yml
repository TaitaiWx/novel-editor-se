name: Sync Release to Mirror

on:
  workflow_run:
    workflows: ['Release']
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to sync (e.g. v1.0.1-beta.27)'
        required: false

env:
  MIRROR_HOST: ${{ secrets.MIRROR_SSH_HOST }}
  MIRROR_USER: ${{ secrets.MIRROR_SSH_USER }}
  MIRROR_BASE: /var/www/dl.wayintech.net/novel-editor

permissions:
  contents: read

jobs:
  sync-mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >-
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v5

      - name: Resolve release tag
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            # 手动触发：使用输入的 tag
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            # workflow_run 触发：从触发分支的 tag 获取
            TAG="${{ github.event.workflow_run.head_branch }}"
            if [ -z "$TAG" ]; then
              echo "::error::Cannot resolve tag from workflow_run event"
              exit 1
            fi
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Unable to resolve release tag"
            exit 1
          fi

      - name: Download release assets from GitHub
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.resolve.outputs.tag }}"
          mkdir -p artifacts

          echo "Downloading assets for release: ${TAG}"
          gh release download "${TAG}" --dir artifacts || {
            echo "::error::Failed to download release assets for ${TAG}"
            exit 1
          }

          echo "=== Downloaded files ==="
          ls -lh artifacts/

      - name: Organize by platform and arch
        run: |
          set -euo pipefail
          BASE=mirror-out/latest
          TAG="${{ steps.resolve.outputs.tag }}"

          # Original files: "Novel-Editor-{ver}-{os}-{arch}.{ext}" (already clean)
          # Stable shortcuts: "{os}-{arch}.{ext}" (always point to latest)
          mkdir -p "${BASE}"
          for f in artifacts/*; do
            name=$(basename "$f")
            case "$name" in
              *-mac-arm64.dmg)         cp "$f" "${BASE}/"; cp "$f" "${BASE}/mac-arm64.dmg" ;;
              *-mac-arm64.zip)         cp "$f" "${BASE}/"; cp "$f" "${BASE}/mac-arm64.zip" ;;
              *-mac-x64.dmg)           cp "$f" "${BASE}/"; cp "$f" "${BASE}/mac-x64.dmg" ;;
              *-mac-x64.zip)           cp "$f" "${BASE}/"; cp "$f" "${BASE}/mac-x64.zip" ;;
              *-win-x64.exe)           cp "$f" "${BASE}/"; cp "$f" "${BASE}/win-x64.exe" ;;
              *-win-ia32.exe)          cp "$f" "${BASE}/"; cp "$f" "${BASE}/win-ia32.exe" ;;
              *-win-arm64.exe)         cp "$f" "${BASE}/"; cp "$f" "${BASE}/win-arm64.exe" ;;
              *-linux-x86_64.AppImage) cp "$f" "${BASE}/"; cp "$f" "${BASE}/linux-x64.AppImage" ;;
              *-linux-amd64.deb)       cp "$f" "${BASE}/"; cp "$f" "${BASE}/linux-x64.deb" ;;
              *.blockmap)              ;; # skip blockmaps
              *.yml)                   cp "$f" "${BASE}/" ;;
              *)                       cp "$f" "${BASE}/" ;;
            esac
          done

          # Generate version metadata
          printf '{\n  "version": "%s",\n  "tag": "%s",\n  "date": "%s",\n  "github": "https://github.com/TaitaiWx/novel-editor-se/releases/tag/%s"\n}\n' \
            "${TAG#v}" "${TAG}" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "${TAG}" \
            > "${BASE}/version.json"

          # Create channel-specific yml copies for pre-release versions.
          # electron-updater looks for "{channel}-mac.yml" based on autoUpdater.channel.
          # electron-builder always generates "latest-*.yml", so we need to copy them
          # to "beta-*.yml" / "alpha-*.yml" to match what the auto-updater expects.
          VERSION="${TAG#v}"
          CHANNEL=""
          case "$VERSION" in
            *-beta.*)  CHANNEL="beta" ;;
            *-alpha.*|*-canary.*) CHANNEL="alpha" ;;
          esac
          if [ -n "$CHANNEL" ]; then
            for yml in "${BASE}"/latest-*.yml "${BASE}/latest.yml"; do
              [ -f "$yml" ] || continue
              ymlname=$(basename "$yml")
              target="${BASE}/${ymlname/latest/$CHANNEL}"
              cp "$yml" "$target"
              echo "Created channel yml: $(basename "$target")"
            done
          fi

          echo "=== Mirror structure ==="
          find mirror-out -type f | sort

      - name: Cleanup old files on mirror
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.MIRROR_SSH_HOST }}
          username: ${{ secrets.MIRROR_SSH_USER }}
          key: ${{ secrets.MIRROR_SSH_KEY }}
          script: |
            DIR="${{ env.MIRROR_BASE }}/latest"
            if [ -d "$DIR" ]; then
              echo "=== Before cleanup ==="
              du -sh "$DIR"
              # Remove old versioned files (Novel-Editor-*), keep stable shortcuts and yml
              find "$DIR" -name 'Novel-Editor-*' -type f -delete
              # Remove old dot-files like Novel.Editor-* if any
              find "$DIR" -name 'Novel.Editor-*' -type f -delete
              echo "=== After cleanup ==="
              du -sh "$DIR"
            fi

      - name: Deploy to mirror server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.MIRROR_SSH_HOST }}
          username: ${{ secrets.MIRROR_SSH_USER }}
          key: ${{ secrets.MIRROR_SSH_KEY }}
          source: mirror-out/*
          target: ${{ env.MIRROR_BASE }}
          strip_components: 1
          overwrite: true

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.MIRROR_SSH_HOST }}
          username: ${{ secrets.MIRROR_SSH_USER }}
          key: ${{ secrets.MIRROR_SSH_KEY }}
          script: |
            echo "=== Mirror contents ==="
            find ${{ env.MIRROR_BASE }}/latest -type f | sort
            echo ""
            echo "=== Version info ==="
            cat ${{ env.MIRROR_BASE }}/latest/version.json 2>/dev/null || echo "No version.json found"
