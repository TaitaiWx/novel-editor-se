name: Release

on:
  push:
    tags:
      - 'v*'

env:
  NOVEL_EDITOR_STABLE_STAGING_PERCENTAGE: '100'
  NOVEL_EDITOR_BETA_STAGING_PERCENTAGE: '25'
  NOVEL_EDITOR_CANARY_STAGING_PERCENTAGE: '10'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            platform: darwin
            arch: x64
            electron-args: --x64
          - os: macos-15
            platform: darwin
            arch: arm64
            electron-args: --arm64
          - os: windows-latest
            platform: win32
            arch: ia32
            electron-args: --ia32
          - os: windows-latest
            platform: win32
            arch: x64
            electron-args: --x64
          - os: windows-latest
            platform: win32
            arch: arm64
            electron-args: --arm64
          - os: ubuntu-latest
            platform: linux
            arch: x64
            electron-args: --x64

    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - name: Resolve release channel
        id: release_channel
        run: node scripts/resolve-release-channel.mjs

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Cache Electron binaries
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/electron
            ~/AppData/Local/electron/Cache
            ~/.cache/electron
          key: electron-${{ runner.os }}-${{ matrix.arch }}-28.3.3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
        env:
          CI: true

      - name: Rebuild native app deps
        run: pnpm exec electron-rebuild -f -w better-sqlite3 -a ${{ matrix.arch }}
        working-directory: apps/pc

      - name: Prepare App Store Connect API key
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          umask 177
          key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY_CONTENT" > "$key_path"
          echo "APPLE_API_KEY=$key_path" >> "$GITHUB_ENV"
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}

      - name: Build application
        run: pnpm build
        working-directory: apps/pc

      - name: Package Electron app (macOS)
        if: runner.os == 'macOS'
        run: pnpm exec electron-builder ${{ matrix.electron-args }} --publish never
        working-directory: apps/pc
        env:
          APPLE_API_KEY: ${{ env.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOVEL_EDITOR_RELEASE_CHANNEL: ${{ steps.release_channel.outputs.publish_channel }}

      - name: Package Electron app (Windows/Linux)
        if: runner.os != 'macOS'
        run: pnpm exec electron-builder ${{ matrix.electron-args }} --publish never
        working-directory: apps/pc
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOVEL_EDITOR_RELEASE_CHANNEL: ${{ steps.release_channel.outputs.publish_channel }}
          # TODO: 申请 Windows 代码签名证书后启用
          # WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          # WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Prepare update metadata
        run: node ./scripts/prepare-update-metadata.mjs ./build ${{ steps.release_channel.outputs.publish_channel }}
        working-directory: apps/pc

      - name: Smoke test packaged app (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a node ./scripts/run-packaged-smoke-test.mjs
        working-directory: apps/pc

      - name: Smoke test packaged app (macOS/Windows)
        if: runner.os != 'Linux' && !(runner.os == 'Windows' && matrix.arch == 'arm64')
        run: node ./scripts/run-packaged-smoke-test.mjs
        working-directory: apps/pc

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: novel-editor-se-release-${{ runner.os }}-${{ matrix.arch }}
          path: |
            apps/pc/build/*.dmg
            apps/pc/build/*.zip
            apps/pc/build/*.exe
            apps/pc/build/*.msi
            apps/pc/build/*.AppImage
            apps/pc/build/*.deb
            apps/pc/build/*.rpm
            apps/pc/build/*.yml
          if-no-files-found: ignore

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Resolve release channel
        id: release_channel
        run: node scripts/resolve-release-channel.mjs

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release
        uses: ncipollo/release-action@v1
        with:
          artifacts: artifacts/**/*
          allowUpdates: true
          artifactErrorsFailBuild: true
          generateReleaseNotes: true
          replacesArtifacts: true
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          token: ${{ secrets.GITHUB_TOKEN }}
