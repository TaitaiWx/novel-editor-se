name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS: 通过独立任务分别产出 x64 / arm64，避免单次打包同时触发双架构重建
          - os: macos-latest
            arch: x64
            electron-args: --x64
          - os: macos-latest
            arch: arm64
            electron-args: --arm64
          # Windows: 单任务单架构，交给 CLI 参数控制目标架构
          - os: windows-latest
            arch: ia32
            electron-args: --ia32
          - os: windows-latest
            arch: x64
            electron-args: --x64
          - os: windows-latest
            arch: arm64
            electron-args: --arm64
          # Linux runner 上 better-sqlite3 的跨架构重建不稳定，仅发布原生可稳定产出的 x64
          - os: ubuntu-latest
            arch: x64
            electron-args: --x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          CI: true

      - name: Build application
        run: pnpm build
        working-directory: apps/pc

      - name: Package Electron app
        run: pnpm exec electron-builder ${{ matrix.electron-args }} --publish never
        working-directory: apps/pc
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: release-${{ runner.os }}-${{ matrix.arch }}
          path: |
            apps/pc/build/*.dmg
            apps/pc/build/*.zip
            apps/pc/build/*.exe
            apps/pc/build/*.msi
            apps/pc/build/*.AppImage
            apps/pc/build/*.deb
            apps/pc/build/*.rpm
            apps/pc/build/*.yml
          if-no-files-found: ignore

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
