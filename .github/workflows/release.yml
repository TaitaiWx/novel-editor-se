name: Release

on:
  push:
    tags:
      - 'v*'

env:
  NOVEL_EDITOR_STABLE_STAGING_PERCENTAGE: '100'
  NOVEL_EDITOR_BETA_STAGING_PERCENTAGE: '25'
  NOVEL_EDITOR_CANARY_STAGING_PERCENTAGE: '10'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            arch: x64
            electron-args: --x64
          - os: macos-latest
            arch: arm64
            electron-args: --arm64
          - os: windows-latest
            arch: ia32
            electron-args: --ia32
          - os: windows-latest
            arch: x64
            electron-args: --x64
          - os: windows-latest
            arch: arm64
            electron-args: --arm64
          - os: ubuntu-latest
            arch: x64
            electron-args: --x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Resolve release channel
        id: release_channel
        run: node scripts/resolve-release-channel.mjs

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          CI: true

      - name: Build application
        run: pnpm build
        working-directory: apps/pc

      - name: Package Electron app
        run: pnpm exec electron-builder ${{ matrix.electron-args }} --publish never -c.publish.channel=${{ steps.release_channel.outputs.publish_channel }}
        working-directory: apps/pc
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOVEL_EDITOR_RELEASE_CHANNEL: ${{ steps.release_channel.outputs.publish_channel }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: novel-editor-se-release-${{ runner.os }}-${{ matrix.arch }}
          path: |
            apps/pc/build/*.dmg
            apps/pc/build/*.zip
            apps/pc/build/*.exe
            apps/pc/build/*.msi
            apps/pc/build/*.AppImage
            apps/pc/build/*.deb
            apps/pc/build/*.rpm
            apps/pc/build/*.yml
          if-no-files-found: ignore

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Resolve release channel
        id: release_channel
        run: node scripts/resolve-release-channel.mjs

      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release
        uses: ncipollo/release-action@v1
        with:
          artifacts: artifacts/**/*
          allowUpdates: true
          artifactErrorsFailBuild: true
          generateReleaseNotes: true
          replacesArtifacts: true
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          token: ${{ secrets.GITHUB_TOKEN }}
