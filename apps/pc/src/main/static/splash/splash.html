<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="./splash.css">
</head>
<body>
  <div class="splash">
    <svg class="spinner" width="40" height="40" viewBox="0 0 50 50">
      <circle cx="25" cy="25" r="20" fill="none" stroke="#333" stroke-width="3"/>
      <circle cx="25" cy="25" r="20" fill="none" stroke="#569cd6" stroke-width="3"
        stroke-linecap="round" stroke-dasharray="80 126"/>
    </svg>
    <span class="label" id="splash-label">正在启动...</span>
    <span class="hint" id="splash-hint"></span>
  </div>
</body>
</html>
