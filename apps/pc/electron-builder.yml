appId: com.novel-editor.app
productName: Novel Editor
copyright: Copyright © 2024-2026

directories:
  output: build
  buildResources: resources

files:
  - dist/**/*
  - package.json

extraResources:
  - from: ../../sample-data
    to: sample-data
    filter:
      - "**/*"

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  hardenedRuntime: true
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist

win:
  target:
    - target: nsis
      arch:
        - x64
        - arm64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

linux:
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
  category: Office
  maintainer: Novel Editor Team

publish:
  provider: github
  owner: "${GH_OWNER}"
  repo: "${GH_REPO}"

# Auto-update configuration
# electron-updater reads this to check for updates on GitHub Releases
