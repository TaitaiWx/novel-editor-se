appId: com.novel-editor.app
productName: Novel Editor
copyright: Copyright © 2024-2026

directories:
  output: build
  buildResources: resources

artifactName: ${productName}-${version}-${os}-${arch}.${ext}

files:
  - dist/**/*
  - package.json

extraResources:
  - from: ../../sample-data
    to: sample-data
    filter:
      - "**/*"

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
    - target: zip
  hardenedRuntime: true
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist

win:
  target:
    - target: nsis

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

linux:
  target:
    - target: AppImage
    - target: deb
  category: Office
  maintainer: Novel Editor Team

publish:
  provider: github
  owner: TaitaiWx
  repo: novel-editor-se

# Auto-update configuration
# electron-updater reads this to check for updates on GitHub Releases
# owner/repo are auto-detected from GITHUB_REPOSITORY env var in CI
