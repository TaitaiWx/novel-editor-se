appId: com.novel-editor.app
productName: Novel Editor
copyright: Copyright © 2024-2026

directories:
  output: build
  buildResources: resources

electronUpdaterCompatibility: '>=2.16'
generateUpdatesFilesForAllChannels: true
detectUpdateChannel: true
afterAllArtifactBuild: ./scripts/prepare-update-metadata.mjs
npmRebuild: false

artifactName: Novel-Editor-${version}-${os}-${arch}.${ext}
asarUnpack:
  - node_modules/better-sqlite3/**/*
  - node_modules/bindings/**/*
  - node_modules/file-uri-to-path/**/*

files:
  - dist/**/*
  - package.json
  - node_modules/**/*
  - resources/branding/**/*

extraResources:
  - from: sample-data
    to: sample-data
    filter:
      - '**/*'
  - from: release-notes.json
    to: release-notes.json

mac:
  icon: resources/icon.icns
  category: public.app-category.productivity
  target:
    - target: dmg
    - target: zip
  hardenedRuntime: true
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist

dmg:
  icon: resources/icon.icns

win:
  icon: resources/icon.ico
  # signDlls: true  # TODO: 申请 Windows 代码签名证书后启用
  target:
    - target: nsis

nsis:
  guid: novel-editor-se
  oneClick: true
  perMachine: false
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: Novel Editor
  deleteAppDataOnUninstall: false
  installerIcon: resources/icon.ico
  uninstallerIcon: resources/icon.ico
  installerHeaderIcon: resources/icon.ico
  # 自定义安装脚本：安装/升级/卸载前自动关闭旧实例，避免“无法关闭”弹窗
  include: resources/installer.nsh

linux:
  icon: resources/icon.png
  target:
    - target: AppImage
    - target: deb
  category: Office
  maintainer: Novel Editor Team

publish:
  provider: github
  owner: TaitaiWx
  repo: novel-editor-se
# Auto-update configuration
# electron-updater reads this to check for updates on GitHub Releases
# owner/repo are auto-detected from GITHUB_REPOSITORY env var in CI
