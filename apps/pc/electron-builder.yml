appId: com.novel-editor.app
productName: Novel Editor
copyright: Copyright © 2024-2026

directories:
  output: build
  buildResources: resources

electronUpdaterCompatibility: '>=2.16'
generateUpdatesFilesForAllChannels: true
detectUpdateChannel: true
afterAllArtifactBuild: ./scripts/prepare-update-metadata.mjs
afterSign: ./scripts/notarize.mjs
npmRebuild: false

artifactName: ${productName}-${version}-${os}-${arch}.${ext}
asarUnpack:
  - node_modules/better-sqlite3/**/*

files:
  - dist/**/*
  - package.json
  - resources/branding/**/*

extraResources:
  - from: ../../sample-data
    to: sample-data
    filter:
      - "**/*"

mac:
  icon: resources/icon.icns
  category: public.app-category.productivity
  target:
    - target: dmg
    - target: zip
  hardenedRuntime: true
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist

dmg:
  icon: resources/icon.icns

win:
  icon: resources/icon.ico
  target:
    - target: nsis

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  installerIcon: resources/icon.ico
  uninstallerIcon: resources/icon.ico
  installerHeaderIcon: resources/icon.ico

linux:
  icon: resources/icon.png
  target:
    - target: AppImage
    - target: deb
  category: Office
  maintainer: Novel Editor Team

publish:
  provider: github
  owner: TaitaiWx
  repo: novel-editor-se

# Auto-update configuration
# electron-updater reads this to check for updates on GitHub Releases
# owner/repo are auto-detected from GITHUB_REPOSITORY env var in CI
